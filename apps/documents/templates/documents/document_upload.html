{% extends "base.html" %}

{% block title %}資料アップロード | PMI Portal{% endblock %}

{% block content %}
<div class="card">
    <div class="page-header">
        <h2>資料アップロード</h2>
        <a class="button-secondary" href="{% url 'documents:list' %}">一覧へ戻る</a>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">
            <button class="button" type="submit">アップロードする</button>
        </div>
    </form>
</div>
{% endblock %}
