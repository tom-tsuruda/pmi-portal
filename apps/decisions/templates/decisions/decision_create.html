{% extends "base.html" %}

{% block title %}意思決定登録 | PMI Portal{% endblock %}

{% block content %}
<div class="card">
    <div class="page-header">
        <h2>新規意思決定登録</h2>
        {% if deal_id %}
            <a class="button-secondary" href="{% url 'deals:detail' deal_id %}">案件詳細へ戻る</a>
        {% else %}
            <a class="button-secondary" href="{% url 'decisions:list' %}">一覧へ戻る</a>
        {% endif %}
    </div>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">
            <button class="button" type="submit">登録する</button>
        </div>
    </form>
</div>
{% endblock %}
