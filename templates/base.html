<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PMI Portal{% endblock %}</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            background: #f5f6f8;
            color: #1f2937;
            font-size: 13px;
            line-height: 1.5;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 14px 28px;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            line-height: 1.2;
        }

        nav {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
        }

        nav a {
            color: #d1d5db;
            text-decoration: none;
            font-size: 13px;
            white-space: nowrap;
        }

        nav a:hover {
            color: white;
            text-decoration: underline;
        }

        main {
            padding: 24px 32px;
        }

        .container {
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 14px;
        }

        .page-header h2 {
            margin: 0;
            font-size: 21px;
            line-height: 1.25;
        }

        .page-header h3 {
            margin: 0;
            font-size: 17px;
        }

        p {
            font-size: 13px;
        }

        .button,
        button.button {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            line-height: 1.3;
            white-space: nowrap;
        }

        .button:hover,
        button.button:hover {
            background: #1d4ed8;
        }

        .button-secondary,
        button.button-secondary {
            display: inline-block;
            background: #6b7280;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            line-height: 1.3;
            white-space: nowrap;
        }

        .button-secondary:hover,
        button.button-secondary:hover {
            background: #4b5563;
        }

        .button-danger,
        button.button-danger {
            display: inline-block;
            background: #dc2626;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            line-height: 1.3;
            white-space: nowrap;
        }

        .button-danger:hover,
        button.button-danger:hover {
            background: #b91c1c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            border-bottom: 1px solid #e5e7eb;
            padding: 7px 8px;
            text-align: left;
            font-size: 12.5px;
            vertical-align: middle;
        }

        th {
            background: #f9fafb;
            color: #374151;
            font-weight: 700;
            white-space: nowrap;
        }

        td {
            color: #1f2937;
        }

        td strong {
            font-size: 12.5px;
        }

        .messages {
            margin-bottom: 14px;
        }

        .message {
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12.5px;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        form p {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 12.5px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="email"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 7px 9px;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            font-size: 12.5px;
            background: white;
        }

        textarea {
            line-height: 1.5;
        }

        .helptext {
            display: block;
            color: #6b7280;
            font-size: 11.5px;
            margin-top: 3px;
        }

        .form-actions {
            margin-top: 18px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .empty {
            color: #6b7280;
            padding: 18px;
            text-align: center;
            font-size: 12.5px;
        }

        .detail-section {
            margin-top: 20px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .summary-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 13px;
        }

        .summary-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 22px;
            font-weight: 700;
            color: #111827;
            line-height: 1.15;
        }

        .summary-sub {
            font-size: 11.5px;
            color: #6b7280;
            margin-top: 5px;
        }

        .summary-link {
            text-decoration: none;
            color: inherit;
        }

        .summary-link:hover .summary-box {
            border-color: #2563eb;
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.12);
        }

        .filter-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 18px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 7px;
            padding-top: 24px;
            font-size: 12.5px;
        }

        .checkbox-row label {
            margin: 0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .mini-note,
        .mini-guide {
            font-size: 11.5px;
            line-height: 1.45;
        }

        /* 一覧画面用：ボタンが縦長にならないようにする */
        table .button,
        table .button-secondary,
        table .button-danger,
        table button {
            font-size: 11.5px;
            padding: 5px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }

        table select {
            min-width: 105px;
            padding: 5px 7px;
            font-size: 11.5px;
        }

        @media (max-width: 1200px) {
            .summary-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 1000px) {
            .filter-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            main {
                padding: 14px;
            }

            .page-header {
                flex-direction: column;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
                color: #111827;
            }

            header,
            nav,
            .no-print,
            .button,
            .button-secondary,
            .button-danger {
                display: none !important;
            }

            .card {
                box-shadow: none;
                border: 1px solid #e5e7eb;
                page-break-inside: avoid;
            }

            .detail-section {
                page-break-inside: avoid;
            }

            table {
                page-break-inside: auto;
            }

            tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>PMI Portal</h1>
    <nav>
        <a href="{% url 'dashboard:home' %}">Home</a>
        <a href="{% url 'deals:list' %}">案件一覧</a>
        <a href="{% url 'deals:create' %}">案件登録</a>
        <a href="{% url 'tasks:list' %}">タスク一覧</a>
        <a href="{% url 'tasks:create' %}">タスク登録</a>
        <a href="{% url 'raid:list' %}">RAID一覧</a>
        <a href="{% url 'raid:create' %}">RAID登録</a>
        <a href="{% url 'documents:list' %}">資料一覧</a>
        <a href="{% url 'documents:upload' %}">資料アップロード</a>
        <a href="{% url 'decisions:list' %}">意思決定一覧</a>
        <a href="{% url 'decisions:create' %}">意思決定登録</a>
        <a href="{% url 'approvals:list' %}">承認一覧</a>
        <a href="{% url 'approvals:create' %}">承認依頼</a>
        <a href="{% url 'audit:list' %}">操作履歴</a>
    </nav>
</header>

<main>
    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</main>
</body>
</html>
