<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PMI Portal{% endblock %}</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            background: #f5f6f8;
            color: #222;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 16px 32px;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav {
            margin-top: 8px;
        }

        nav a {
            color: #d1d5db;
            margin-right: 16px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: white;
            text-decoration: underline;
        }

        main {
            padding: 32px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .page-header h2 {
            margin: 0;
        }

        .button {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .button-secondary {
            display: inline-block;
            background: #6b7280;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #f9fafb;
            color: #374151;
        }

        .messages {
            margin-bottom: 16px;
        }

        .message {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        form p {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        .helptext {
            display: block;
            color: #6b7280;
            font-size: 12px;
        }

        .form-actions {
            margin-top: 24px;
        }

        .empty {
            color: #6b7280;
            padding: 24px;
            text-align: center;
        }

        .detail-section {
            margin-top: 24px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 24px;
        }

        .summary-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 18px;
        }

        .summary-label {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
        }

        .summary-sub {
            font-size: 12px;
            color: #6b7280;
            margin-top: 6px;
        }

        @media (max-width: 900px) {
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }
        } 
    </style>
</head>
<body>
<header>
    <h1>PMI Portal</h1>
    <nav>
        <a href="{% url 'deals:list' %}">案件一覧</a>
        <a href="{% url 'deals:create' %}">案件登録</a>
        <a href="{% url 'tasks:list' %}">タスク一覧</a>
        <a href="{% url 'tasks:create' %}">タスク登録</a>
        <a href="{% url 'raid:list' %}">RAID一覧</a>
        <a href="{% url 'raid:create' %}">RAID登録</a>
        <a href="{% url 'documents:list' %}">資料一覧</a>
        <a href="{% url 'documents:upload' %}">資料アップロード</a>
    </nav>
</header>

<main>
    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</main>
</body>
</html>
